name: Android Debug Build (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;21.3.6528147"

      - name: Build debug APKs
        run: |
          mkdir -p references/logs
          ts="$(date -Iseconds | tr ':' '-')"
          log_file="$GITHUB_WORKSPACE/references/logs/android_build_${ts}.log"
          cd "$GITHUB_WORKSPACE/repos/termbot-termbot"
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug 2>&1 | tee "$log_file"

      - name: Upload debug APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termbot-debug-apks
          if-no-files-found: error
          path: |
            repos/termbot-termbot/app/build/outputs/apk/oss/debug/app-oss-debug.apk
            repos/termbot-termbot/app/build/outputs/apk/google/debug/app-google-debug.apk

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          if-no-files-found: warn
          path: |
            references/logs/android_build_*.log
